# 默认：仅 Java 网关（无 C++ room-worker）。健康检查 /healthz、/readyz 由网关进程直接响应。
# MySQL / Redis：在 .env 里填内网地址。
#
#   cd deploy/docker && cp env.example .env && nano .env
#   docker compose up -d --build
#
# 若在宿主机上仍需 C++ worker，请另起进程或自行加回 compose 服务，并取消设置 NEBULA_ROOM_WORKER_DISABLED。

networks:
  nebula:
    driver: bridge

services:
  gateway:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.gateway
    image: "${GATEWAY_IMAGE:-nebula-gateway:latest}"
    restart: unless-stopped
    cpus: "1.00"
    mem_limit: "768m"
    memswap_limit: "768m"
    networks:
      - nebula
    ports:
      - "${GATEWAY_PUBLISH_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      NEBULA_REPO_ROOT: /app
      PORT: "8080"
      # 不向 C++ 建 TCP 桥；静态页 + /ws 房间控制仍为 Java
      NEBULA_ROOM_WORKER_DISABLED: "1"
      # WebSocket/Jetty：云上默认拉满链路空闲阈值；同一目录 .env 可覆盖任一变量（Compose 插值）。
      NEBULA_JETTY_WS_IDLE_MS: ${NEBULA_JETTY_WS_IDLE_MS:-900000}
      NEBULA_WS_IDLE_DISCONNECT_MS: ${NEBULA_WS_IDLE_DISCONNECT_MS:-180000}
      NEBULA_WS_JETTY_PING_INTERVAL_SEC: ${NEBULA_WS_JETTY_PING_INTERVAL_SEC:-20}
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m -XX:MaxMetaspaceSize=192m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf --max-time 2 http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 45s
      timeout: 3s
      retries: 5
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
