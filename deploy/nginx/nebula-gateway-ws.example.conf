# 片段：反向代理 Java 网关的 WebSocket（/ws）。
# 若在浏览器里看到_ws_约 30s / 60s「准时」断开并重连，先查本链路各层的「空闲超时」：
# — Nginx: proxy_*_timeout（官方默认常为 60s，许多云镜像/模板会为 30s）
# — 云 SLB/ALB/CLB/CDN（有时比业务 Nginx 更短）
# — 与安全组/WAF 无关 TCP 超时
#
# 「拉长超时」与「前端定期 ping（见仓库 proto-socket HEARTBEAT_INTERVAL_MS）」可同时使用；仅改前端不重配代理，常会反复 onclose。
#
# 将 upstream 改成你的网关实际地址（同机可用 127.0.0.1:8080）。

upstream nebula_gateway {
    server 127.0.0.1:8080;
}

server {
    listen 443 ssl http2;
    server_name poker.example.com;

    # ssl_certificate ... （略）

    location /ws {
        proxy_pass http://nebula_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 75s;

        proxy_buffering off;
    }

    location / {
        proxy_pass http://nebula_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
