# 推送到 main 后，SSH 登录腾讯云 CVM 执行 pull + docker compose。
#
# 在 GitHub 仓库 Settings → Secrets and variables → Actions 中新建：
#   CVM_HOST       服务器公网 IP 或域名
#   CVM_USER       如 ubuntu
#   CVM_SSH_KEY    用于登录的私钥全文（BEGIN … END）
#
# 可选：改下方 script 里的仓库路径（默认 /home/ubuntu/DEZHOU2）。
name: Deploy to CVM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH pull & docker compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CVM_HOST }}
          username: ${{ secrets.CVM_USER }}
          key: ${{ secrets.CVM_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /home/ubuntu/DEZHOU2/deploy/docker
            git pull origin main
            bash start-docker-only.sh
