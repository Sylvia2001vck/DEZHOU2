# push 到 main/master 后，SSH 登录腾讯云 CVM 执行部署。
# 手动触发（workflow_dispatch）同样可用；并发部署会自动互斥。
#
# 必需 Secrets（Settings → Secrets and variables → Actions）：
#   CVM_HOST       服务器公网 IP 或域名
#   CVM_USER       如 ubuntu
#   CVM_SSH_KEY    用于登录的私钥全文（BEGIN … END）
name: Deploy to CVM

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: deploy-cvm-main
      cancel-in-progress: true
    steps:
      - name: SSH pull & docker compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CVM_HOST }}
          username: ${{ secrets.CVM_USER }}
          key: ${{ secrets.CVM_SSH_KEY }}
          command_timeout: 30m
          script_stop: true
          script: |
            set -euo pipefail

            REPO_DIR="/home/ubuntu/DEZHOU2"
            COMPOSE_DIR="$REPO_DIR/deploy/docker"

            if [[ ! -d "$REPO_DIR/.git" ]]; then
              echo "[deploy] missing git repo: $REPO_DIR" >&2
              exit 1
            fi
            if [[ ! -d "$COMPOSE_DIR" ]]; then
              echo "[deploy] missing compose dir: $COMPOSE_DIR" >&2
              exit 1
            fi

            cd "$REPO_DIR"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            cd "$COMPOSE_DIR"
            if [[ ! -f ".env" ]]; then
              echo "[deploy] missing .env in $COMPOSE_DIR" >&2
              exit 1
            fi

            echo "[deploy] compose services:"
            docker compose config --services

            # Low-memory safe deploy:
            # - never rebuild room-worker (C++)
            # - only rebuild and restart gateway container
            echo "[deploy] ensure room-worker is up (no build)"
            docker compose up -d --no-build room-worker
            AVAIL_MB="$(free -m | awk '/Mem:/ {print $7}')"
            AVAIL_MB="${AVAIL_MB:-0}"
            echo "[deploy] available memory: ${AVAIL_MB} MB"
            if [[ "$AVAIL_MB" -lt 1200 ]]; then
              echo "[deploy] low memory, skip gateway build to avoid OOM; restarting with existing image"
              docker compose up -d --no-deps --no-build gateway
            else
              echo "[deploy] build gateway only (no C++ rebuild)"
              docker compose build gateway
              echo "[deploy] restart gateway only"
              docker compose up -d --no-deps gateway
            fi

            echo "[deploy] compose status:"
            docker compose ps

            echo "[deploy] health check (retry up to 90s):"
            ok=0
            for i in {1..30}; do
              if curl -fsS --max-time 5 http://127.0.0.1:8080/healthz >/dev/null; then
                ok=1
                break
              fi
              sleep 3
            done
            if [[ "$ok" != "1" ]]; then
              echo "[deploy] healthz failed after retries, compose status:" >&2
              docker compose ps >&2 || true
              echo "[deploy] recent gateway logs:" >&2
              docker compose logs gateway --tail 200 >&2 || true
              echo "[deploy] recent room-worker logs:" >&2
              docker compose logs room-worker --tail 120 >&2 || true
              exit 1
            fi
            echo "[deploy] healthz ok"
