# CI 成功后，SSH 登录腾讯云 CVM 拉取最新镜像并重启 gateway。
# 手动触发（workflow_dispatch）同样可用；并发部署会自动互斥。
#
# 必需 Secrets（Settings → Secrets and variables → Actions）：
#   CVM_HOST       服务器公网 IP 或域名
#   CVM_USER       如 ubuntu
#   CVM_SSH_KEY    用于登录的私钥全文（BEGIN … END）
#   GHCR_USER      有 packages:read 的 GitHub 用户名（通常就是你的账号）
#   GHCR_TOKEN     该用户 PAT（至少 read:packages）
name: Deploy to CVM

on:
  workflow_run:
    workflows: ["CI Java Gateway"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          (
            github.event.workflow_run.head_branch == 'main' ||
            github.event.workflow_run.head_branch == 'master'
          )
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: deploy-cvm-main
      cancel-in-progress: true
    steps:
      - name: SSH pull & docker compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CVM_HOST }}
          username: ${{ secrets.CVM_USER }}
          key: ${{ secrets.CVM_SSH_KEY }}
          command_timeout: 30m
          script_stop: true
          script: |
            set -euo pipefail

            REPO_DIR="/home/ubuntu/DEZHOU2"
            COMPOSE_DIR="$REPO_DIR/deploy/docker"

            if [[ ! -d "$REPO_DIR/.git" ]]; then
              echo "[deploy] missing git repo: $REPO_DIR" >&2
              exit 1
            fi
            if [[ ! -d "$COMPOSE_DIR" ]]; then
              echo "[deploy] missing compose dir: $COMPOSE_DIR" >&2
              exit 1
            fi

            cd "$REPO_DIR"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            cd "$COMPOSE_DIR"
            if [[ ! -f ".env" ]]; then
              echo "[deploy] missing .env in $COMPOSE_DIR" >&2
              exit 1
            fi

            OWNER_RAW="${{ github.repository_owner }}"
            OWNER_LC="$(printf '%s' "$OWNER_RAW" | tr '[:upper:]' '[:lower:]')"
            export GATEWAY_IMAGE="ghcr.io/${OWNER_LC}/dezhou-gateway:latest"
            echo "[deploy] gateway image: ${GATEWAY_IMAGE}"

            GHCR_USER="${{ secrets.GHCR_USER }}"
            GHCR_TOKEN="${{ secrets.GHCR_TOKEN }}"
            if [[ -z "$GHCR_USER" || -z "$GHCR_TOKEN" ]]; then
              echo "[deploy] missing GHCR_USER or GHCR_TOKEN secret" >&2
              exit 1
            fi
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            echo "[deploy] compose services:"
            docker compose config --services

            # Deploy path (no compile on CVM):
            # - keep room-worker running
            # - pull latest gateway image from GHCR
            # - restart gateway container only
            echo "[deploy] ensure room-worker is up (no build)"
            docker compose up -d --no-build room-worker
            echo "[deploy] pull latest gateway image from GHCR"
            docker compose pull gateway
            echo "[deploy] restart gateway only"
            docker compose up -d --no-deps --no-build gateway

            echo "[deploy] compose status:"
            docker compose ps

            echo "[deploy] health check (retry up to 90s):"
            ok=0
            for i in {1..30}; do
              if curl -fsS --max-time 5 http://127.0.0.1:8080/healthz >/dev/null; then
                ok=1
                break
              fi
              sleep 3
            done
            if [[ "$ok" != "1" ]]; then
              echo "[deploy] healthz failed after retries, compose status:" >&2
              docker compose ps >&2 || true
              echo "[deploy] recent gateway logs:" >&2
              docker compose logs gateway --tail 200 >&2 || true
              echo "[deploy] recent room-worker logs:" >&2
              docker compose logs room-worker --tail 120 >&2 || true
              exit 1
            fi
            echo "[deploy] healthz ok"
